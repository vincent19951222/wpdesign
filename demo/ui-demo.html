<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELFORGE.DEV - Retro UI</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入经典像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* 基础设置：禁用抗锯齿，强化像素感 */
        body {
            background-color: #f6e5c0; /* 背景米黄色 */
            background-image: radial-gradient(#e5d1a8 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-font-smoothing: none;
            overflow-x: hidden;
        }

        /* 字体系统 */
        .font-pixel { font-family: 'Press Start 2P', monospace; }
        .font-pixel-sm { font-family: 'VT323', monospace; font-size: 1.5rem; line-height: 1.2; }

        /* ----------------------------------
           核心复古组件样式库 (CSS 魔法)
           ---------------------------------- */
        
        /* 像素边框面板 */
        .pixel-panel {
            border: 4px solid #1a1a1a;
            background-color: #fff9ed;
            box-shadow: 8px 8px 0px 0px #1a1a1a;
        }

        /* 3D 凸起按钮（带高光与暗部内阴影） */
        .pixel-btn {
            position: relative;
            border: 4px solid #1a1a1a;
            /* 组合阴影：白色内发光(高光) + 黑色内发光(暗部) + 黑色外阴影(实体厚度) */
            box-shadow: inset 4px 4px 0px rgba(255, 255, 255, 0.4), 
                        inset -4px -4px 0px rgba(0, 0, 0, 0.2), 
                        4px 4px 0px #1a1a1a;
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
            text-align: center;
        }

        /* 按钮按下状态（模拟物理机械触发） */
        .pixel-btn:active, .pixel-btn-pressed {
            transform: translate(4px, 4px);
            box-shadow: inset 4px 4px 0px rgba(0, 0, 0, 0.2), 
                        inset -4px -4px 0px rgba(255, 255, 255, 0.4), 
                        0px 0px 0px #1a1a1a;
        }

        /* 颜色变体定义 */
        .btn-red    { background-color: #e64a4e; color: white; }
        .btn-green  { background-color: #5b9e54; color: white; }
        .btn-orange { background-color: #e58c3a; color: white; }
        .btn-blue   { background-color: #3666b3; color: white; }
        .btn-yellow { background-color: #e8c440; color: black; }
        .btn-purple { background-color: #8e52a3; color: white; }

        /* 表单输入框 (下陷效果) */
        .pixel-input {
            border: 4px solid #1a1a1a;
            background-color: #ffffff;
            /* 顶部内阴影模拟下凹 */
            box-shadow: inset 4px 4px 0px rgba(0, 0, 0, 0.1),
                        4px 4px 0px #1a1a1a;
            outline: none;
            padding: 8px 12px;
        }
        .pixel-input:focus {
            background-color: #e0f7fa;
        }

        /* 导航栏样式 */
        .pixel-nav-item {
            border-right: 4px solid #1a1a1a;
            padding: 12px 24px;
            transition: background 0.2s;
        }
        .pixel-nav-item:hover { background-color: #e58c3a; color: white; }

        /* 分割线 */
        .pixel-divider {
            border-bottom: 4px dashed #1a1a1a;
            margin: 24px 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12">

    <!-- 主容器：正常平面视角 -->
    <div id="app-container" class="w-full max-w-5xl mx-4">
        
        <!-- 核心网站面板 -->
        <div class="pixel-panel flex flex-col w-full relative bg-[#fff9ed]">
            
            <!-- Hero / 头部插画区域 -->
            <header class="bg-[#9cd3db] h-56 relative border-b-4 border-[#1a1a1a] overflow-hidden flex flex-col items-center justify-start pt-8">
                <!-- 像素云朵装饰 (CSS 绘制) -->
                <div class="absolute top-8 left-16 w-16 h-8 bg-white" style="box-shadow: 8px -8px 0 white, 16px 0 0 white, 24px -8px 0 white; opacity: 0.8;"></div>
                <div class="absolute top-16 right-32 w-12 h-6 bg-white" style="box-shadow: 6px -6px 0 white, 12px 0 0 white; opacity: 0.8;"></div>
                
                <h1 class="font-pixel text-4xl text-white drop-shadow-[4px_4px_0px_#1a1a1a] tracking-widest z-10">PIXELFORGE.DEV</h1>
                
                <!-- 底部草地块 -->
                <div class="absolute bottom-0 w-full h-8 bg-[#5b9e54] border-t-4 border-[#1a1a1a]"></div>
                <!-- 像素人物占位符 (使用 Emoji 替代实际图片) -->
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-6xl drop-shadow-[4px_4px_0px_#1a1a1a]">👾</div>
            </header>

            <!-- 导航栏 -->
            <nav class="bg-[#e5d9c5] border-b-4 border-[#1a1a1a] flex font-pixel text-sm uppercase font-bold text-[#1a1a1a]">
                <a href="#" class="pixel-nav-item flex-1 text-center bg-[#1a1a1a] text-white">🏠 HOME</a>
                <a href="#" class="pixel-nav-item flex-1 text-center">📁 PORTFOLIO</a>
                <a href="#" class="pixel-nav-item flex-1 text-center">🎨 UI KIT</a>
                <a href="#" class="pixel-nav-item flex-1 text-center">ℹ️ ABOUT</a>
                <a href="#" class="pixel-nav-item flex-1 text-center border-r-0">✉️ CONTACT</a>
            </nav>

            <!-- 主体内容区 (左右双栏布局) -->
            <main class="p-8 grid grid-cols-1 md:grid-cols-2 gap-12">
                
                <!-- 左栏：UI 组件 -->
                <section>
                    <h2 class="font-pixel text-xl mb-6">UI COMPONENTS</h2>
                    
                    <div class="flex gap-8">
                        <!-- 按钮堆叠组 -->
                        <div class="flex flex-col gap-4">
                            <button class="pixel-btn btn-red font-pixel py-3 px-6 w-36">BUTTON</button>
                            <button class="pixel-btn btn-green font-pixel py-3 px-6 w-36">SUBMIT</button>
                            <button class="pixel-btn btn-orange font-pixel py-3 px-6 w-36">CANCEL</button>
                        </div>
                        
                        <!-- 表单组 -->
                        <div class="flex flex-col gap-3 flex-1">
                            <input type="text" placeholder="NAME" class="pixel-input font-pixel-sm text-lg w-full">
                            <input type="email" placeholder="EMAIL" class="pixel-input font-pixel-sm text-lg w-full">
                            <input type="password" placeholder="******" class="pixel-input font-pixel-sm text-lg w-full tracking-widest">
                            <button class="pixel-btn btn-blue font-pixel py-2 mt-1">SUBMIT</button>
                        </div>
                    </div>

                    <div class="pixel-divider"></div>
                    
                    <!-- 交互状态展示 -->
                    <h2 class="font-pixel text-xl mb-6">INTERACTIVE ELEMENTS</h2>
                    <div class="flex justify-between items-center px-4">
                        <!-- 按下状态的按钮 -->
                        <div class="text-center">
                            <button class="pixel-btn-pressed btn-red font-pixel py-3 px-6 w-36 mb-4 relative">
                                BUTTON
                                <!-- 鼠标指针 (CSS绘制模拟) -->
                                <div class="absolute -bottom-8 -right-4 text-3xl drop-shadow-[2px_2px_0px_#1a1a1a] pointer-events-none">👆</div>
                            </button>
                            <div class="font-pixel-sm text-gray-500">ON HOVER / ACTIVE</div>
                        </div>

                        <!-- 迷你详情卡片 -->
                        <div class="border-4 border-[#1a1a1a] bg-white p-2 flex items-center gap-4 shadow-[4px_4px_0_0_#1a1a1a]">
                            <div class="w-12 h-12 bg-gray-200 border-2 border-black flex items-center justify-center">🖼️</div>
                            <div>
                                <div class="w-16 h-3 bg-gray-300 mb-2"></div>
                                <div class="w-10 h-3 bg-[#e64a4e]"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 右栏：颜色与展示 -->
                <section>
                    <h2 class="font-pixel text-xl mb-6 text-right">COLOR PALETTE</h2>
                    
                    <!-- 色板网格 -->
                    <div class="grid grid-cols-3 gap-6 mb-8">
                        <div class="h-16 pixel-btn btn-red cursor-default active:transform-none"></div>
                        <div class="h-16 pixel-btn btn-blue cursor-default active:transform-none"></div>
                        <div class="h-16 pixel-btn btn-green cursor-default active:transform-none"></div>
                        <div class="h-16 pixel-btn btn-yellow cursor-default active:transform-none"></div>
                        <div class="h-16 pixel-btn btn-purple cursor-default active:transform-none"></div>
                        <div class="h-16 pixel-btn btn-orange cursor-default active:transform-none"></div>
                    </div>

                    <div class="pixel-divider"></div>

                    <!-- 占位装饰模块 -->
                    <h2 class="font-pixel text-xl mb-6 text-right">RETRO GAMING AESTHETIC</h2>
                    <div class="flex gap-4 h-32">
                        <div class="flex-1 bg-[#87CEEB] border-4 border-[#1a1a1a] shadow-[4px_4px_0_0_#1a1a1a] relative overflow-hidden">
                            <div class="absolute bottom-0 w-full h-4 bg-[#5b9e54] border-t-4 border-[#1a1a1a]"></div>
                            <div class="absolute bottom-1 left-4 text-2xl drop-shadow-[2px_2px_0px_#1a1a1a]">🏃</div>
                        </div>
                        <div class="flex-1 bg-[#87CEEB] border-4 border-[#1a1a1a] shadow-[4px_4px_0_0_#1a1a1a] relative overflow-hidden">
                            <div class="absolute bottom-0 w-full h-4 bg-[#5b9e54] border-t-4 border-[#1a1a1a]"></div>
                            <div class="absolute bottom-1 right-8 text-2xl drop-shadow-[2px_2px_0px_#1a1a1a] scale-x-[-1]">🍄</div>
                        </div>
                    </div>

                </section>
        </main>
    </div>
</div>

</body>
</html>
